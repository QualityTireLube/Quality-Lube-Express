<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - Quality Lube Express</title>
    <link href="assets/css/main.css" rel="stylesheet"/>
    <link href="assets/css/qualitytirelube.com.css" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="assets/img/favicon-01.png" sizes="32x32" />

    <style>
        body { 
            background-color: #f5f5f5; 
            font-family: inherit;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .site-header-strip {
            background-color: #000;
            color: #fff;
            padding: 10px 0;
            text-align: center;
            font-size: 14px;
        }
        
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('assets/img/hm-slider-cl-main-01.jpg') center/cover no-repeat;
            position: relative;
        }
        
        .login-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            z-index: 1;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: #fff;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            position: relative;
            z-index: 2;
            border-top: 5px solid #d32f2f;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header img {
            max-width: 250px;
            height: auto;
            margin-bottom: 20px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }
        
        .login-header h2 {
            font-size: 24px;
            color: #333;
            margin: 0;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .login-header p {
            color: #777;
            font-size: 14px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 15px;
            transition: border-color 0.3s;
        }
        
        .form-control:focus {
            border-color: #d32f2f;
            outline: none;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #d32f2f;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.3s, transform 0.1s;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            background-color: #b71c1c;
        }
        
        .btn-login:active {
            transform: translateY(1px);
        }

        .btn-login:disabled {
            background-color: #999;
            cursor: not-allowed;
        }

        .error-msg {
            background-color: #ffebee;
            color: #c62828;
            padding: 10px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
            display: none;
            border: 1px solid #ffcdd2;
        }

        .success-msg {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
            font-size: 14px;
            text-align: center;
            display: none;
            border: 1px solid #c8e6c9;
        }

        .success-msg i {
            font-size: 24px;
            display: block;
            margin-bottom: 8px;
        }
        
        .footer-links {
            margin-top: 25px;
            text-align: center;
            font-size: 14px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .footer-links a {
            color: #777;
            text-decoration: none;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: #d32f2f;
            text-decoration: none;
        }

        .footer-links .divider {
            margin: 0 10px;
            color: #ddd;
        }

        .password-requirements {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }
            .login-header img {
                max-width: 200px;
            }
        }
    </style>
</head>
<body>

    <div class="site-header-strip">
        <i class="fas fa-phone-alt"></i> Call: 225-658-9099 &nbsp;|&nbsp; <i class="fas fa-map-marker-alt"></i> 3617 LA-19, Zachary, LA 70791
    </div>

    <div class="login-wrapper">
        <div class="login-overlay"></div>
        <div class="login-container">
            <div class="login-header">
                <img src="assets/img/logo-01.png" alt="Quality Lube Express">
                <h2>Create Account</h2>
                <p>Request access to the Admin Portal</p>
            </div>
            
            <form id="register-form">
                <div class="form-group">
                    <label for="reg-name">Full Name</label>
                    <input type="text" id="reg-name" class="form-control" placeholder="John Smith" required>
                </div>

                <div class="form-group">
                    <label for="reg-email">Email Address</label>
                    <input type="email" id="reg-email" class="form-control" placeholder="you@example.com" required>
                </div>
                
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" class="form-control" placeholder="Create a password" required minlength="6">
                    <div class="password-requirements">Minimum 6 characters</div>
                </div>

                <div class="form-group">
                    <label for="reg-confirm">Confirm Password</label>
                    <input type="password" id="reg-confirm" class="form-control" placeholder="Confirm your password" required minlength="6">
                </div>
                
                <button type="submit" class="btn-login" id="register-btn"><i class="fas fa-user-plus"></i> Create Account</button>

                <div id="register-error" class="error-msg"></div>
                <div id="register-success" class="success-msg">
                    <i class="fas fa-check-circle"></i>
                    <strong>Account created!</strong><br>
                    An administrator must approve your access before you can log in. You'll be able to sign in once approved.
                </div>
            </form>
            
            <div class="footer-links">
                <a href="login.html"><i class="fas fa-sign-in-alt"></i> Back to Login</a>
                <span class="divider">|</span>
                <a href="./"><i class="fas fa-arrow-left"></i> Back to Website</a>
            </div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

    <script>
    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyA2DI7LRK4kR7DZtGRridtmCZYl8F32cLg",
      authDomain: "qualityexpress-c19f2.firebaseapp.com",
      projectId: "qualityexpress-c19f2",
      storageBucket: "qualityexpress-c19f2.firebasestorage.app",
      messagingSenderId: "201962327491",
      appId: "1:201962327491:web:342d771b9013d901cc8176",
      measurementId: "G-HJDBXM5CLX"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const form = document.getElementById('register-form');
    const errorDiv = document.getElementById('register-error');
    const successDiv = document.getElementById('register-success');
    const submitBtn = document.getElementById('register-btn');

    function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        successDiv.style.display = 'none';
    }

    function showSuccess() {
        successDiv.style.display = 'block';
        errorDiv.style.display = 'none';
        form.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorDiv.style.display = 'none';

        const name = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const password = document.getElementById('reg-password').value;
        const confirm = document.getElementById('reg-confirm').value;

        if (!name) { showError('Please enter your full name.'); return; }
        if (password !== confirm) { showError('Passwords do not match.'); return; }
        if (password.length < 6) { showError('Password must be at least 6 characters.'); return; }

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Creating Account...';

        try {
            // Create the Firebase Auth account
            const cred = await auth.createUserWithEmailAndPassword(email, password);
            const user = cred.user;

            // Update display name in Firebase Auth
            await user.updateProfile({ displayName: name });

            // Create the admin_users doc with 'pending' status
            await db.collection('admin_users').doc(user.uid).set({
                uid: user.uid,
                email: email,
                displayName: name,
                status: 'pending',
                role: 'employee',
                allowedTabs: [],
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                approvedBy: null,
                approvedAt: null,
                deniedBy: null,
                deniedAt: null,
                deniedReason: null
            });

            // Sign out immediately — they can't use the dashboard yet
            await auth.signOut();

            showSuccess();
        } catch (err) {
            console.error('Registration error:', err);
            if (err.code === 'auth/email-already-in-use') {
                showError('An account with this email already exists.');
            } else if (err.code === 'auth/weak-password') {
                showError('Password is too weak. Use at least 6 characters.');
            } else if (err.code === 'auth/invalid-email') {
                showError('Please enter a valid email address.');
            } else {
                showError('Registration failed: ' + err.message);
            }
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<i class="fas fa-user-plus"></i> Create Account';
        }
    });
    </script>
</body>
</html>
